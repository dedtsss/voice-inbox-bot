services:
  voice-inbox-bot:
    build: .
    # V1 voice processor is single-worker only; do not scale this service.
    container_name: voice-inbox-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${HTTP_PUBLISHED_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
